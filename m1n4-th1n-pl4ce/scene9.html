<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #fade {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
      z-index: 999;
    }

    #click-zone {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: pointer;
      z-index: 10;
    }

    .hotspot {
      position: fixed;
      cursor: pointer;
      z-index: 10;
      display: none;
       background: rgba(255,0,0,0.3); */
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="fade"></div>
  <div id="click-zone"></div>

  <div class="hotspot" id="h1" style="top: 30%; left: 5%; width: 20%; height: 35%;"></div>
  <div class="hotspot" id="h2" style="top: 25%; left: 35%; width: 25%; height: 45%;"></div>
  <div class="hotspot" id="h3" style="top: 30%; left: 67%; width: 20%; height: 35%;"></div>

  <script>
    const linearSteps = [
      'pics/9-1.svg',
      'pics/9-2.svg',
      'pics/9-3.svg',
      'pics/9-4.svg',
      'pics/9-5.svg',
    ];
    const finalBg = 'pics/9-6.svg';

    const destinations = [
      { id: 'h1', dest: 'scene10.html' },
      { id: 'h2', dest: 'scene11.html' },
      { id: 'h3', dest: 'loop2.html' },
    ];

    const fade = document.getElementById('fade');
    const bg = document.getElementById('bg');
    const clickZone = document.getElementById('click-zone');
    let current = 0;

    bg.style.backgroundImage = `url('${linearSteps[0]}')`;

    clickZone.addEventListener('click', function() {
      current++;
      fade.style.opacity = '1';
      setTimeout(function() {
        if (current < linearSteps.length) {
          bg.style.backgroundImage = `url('${linearSteps[current]}')`;
          fade.style.opacity = '0';
        } else {
          bg.style.backgroundImage = `url('${finalBg}')`;
          fade.style.opacity = '0';
          clickZone.style.display = 'none';
          showHotspots();
        }
      }, 1000);
    });

    function showHotspots() {
      destinations.forEach(function(item) {
        const el = document.getElementById(item.id);
        el.style.display = 'block';
        el.addEventListener('click', function() {
          fade.style.opacity = '1';
          setTimeout(function() {
            window.location.href = item.dest;
          }, 1000);
        });
      });
    }
  </script>
</body>
</html>
