<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene — Multiple Choices</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url('images/scene-choice.jpg');">

  <p class="narration">
    You stand at a crossing. The air is still.
    Something pulls you in different directions.
  </p>

  <!--
    Up to 5 .choice links — just add or remove <a> tags and <br> between them.
    Each links to a different scene file.
  -->
  <div class="choices">
    <a href="scene-left.html" class="choice">Go left, towards the noise</a><br>
    <a href="scene-right.html" class="choice">Go right, into the dark</a><br>
    <a href="scene-back.html" class="choice">Turn back</a>
  </div>

</body>
</html>
