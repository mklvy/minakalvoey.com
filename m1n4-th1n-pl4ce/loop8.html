<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .floating {
      position: absolute;
      margin-top: 20px;
      left: 2%;
      width: 120px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
.floating {
  animation: float 3s ease-in-out infinite, glow 3s ease-in-out 40;
}
@keyframes glow {
  0%   { filter: drop-shadow(0 0 0px orange); }
  50%  { filter: drop-shadow(0 0 15px orange); }
  100% { filter: drop-shadow(0 0 0px orange); }
}    
  </style>
</head>
<body style="
  background-color: orange;
  background-image: url('pics/maze8.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
">

  <audio id="bg-sound" src="sounds/loop.mp3" loop></audio>

  <div class="trickster-wrap">
  <img src="pics/trick2.svg" class="floating">
  <img src="pics/speech8.svg" class="trickster-bubble" id="speech-bubble" style="opacity: 1; transition: opacity 2s;">
</div>

<img id="sprite" src="pics/you.png" style="position: absolute; width: 30px;">

<img id="hint-char" src="pics/frog.png" class="hint-float" style="
  position: absolute;
  width: 60px;
  top: 15%;
  right: 2%;
  opacity: 0;
  transition: opacity 2s;
  pointer-events: none;
">

  <div id="goal" style="
    position: absolute;
    width: 60px;
    height: 60px;
    top: 25%;
    right: 1%;
    /*background: red;*/
  "></div>

  <script>

  localStorage.setItem('maze-visited', 'true');
  document.getElementById('bg-sound').play();

    var sprite = document.getElementById('sprite');
    var goal = document.getElementById('goal');
    var x = window.innerWidth / 2;
    var y = window.innerHeight / 2;
    var speed = 5;
    var keys = {};

    var sprite = document.getElementById('sprite');
    var goal = document.getElementById('goal');
    var speed = 5;
    var keys = {};
    var x = 620;
    var y = 280;

    sprite.style.left = x + 'px';
    sprite.style.top = y + 'px';

    document.addEventListener('keydown', function(e) {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', function(e) {
      keys[e.key] = false;
    });

    function checkGoal() {
      var sr = sprite.getBoundingClientRect();
      var gr = goal.getBoundingClientRect();
      if (
        sr.left < gr.right &&
        sr.right > gr.left &&
        sr.top < gr.bottom &&
        sr.bottom > gr.top
      ) {
        window.location.href = 'scene11.html';
      }
    }

    function move() {
  var newX = x;
  var newY = y;

  if (keys['ArrowUp'])    newY -= speed;
  if (keys['ArrowDown'])  newY += speed;
  if (keys['ArrowLeft'])  newX -= speed;
  if (keys['ArrowRight']) newX += speed;

  x = newX;
  y = newY;

  sprite.style.top = y + 'px';
  sprite.style.left = x + 'px';

  checkGoal();
  requestAnimationFrame(move);
}

    move();

  function isOnWall(px, py) {
  if (!canvas.width) return false; // canvas not ready, allow movement
  var pixel = ctx.getImageData(px, py, 1, 1).data;
  return pixel[0] < 50 && pixel[1] < 50 && pixel[2] < 50;
}

  setTimeout(function() {
  document.getElementById('hint-char').style.opacity = '1';
  }, 10000);

  setTimeout(function() {
  document.getElementById('speech-bubble').style.opacity = '0';
  }, 10000);
  </script>
<script src="popup.js"></script>
</body>
</html>
