<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #rock {
      position: absolute;
      bottom: 75%;
      right: 5%;
      width: 150px;
      opacity: 0;
      transition: opacity 2s;
    }

    #sprite7 {
      position: absolute;
      width: 55px;
      opacity: 0;
      transition: opacity 2s;
    }

    #path {
      position: absolute;
      width: 100%;
      bottom: 0%;
      left: 0%;
      opacity: 0;
      transition: opacity 2s;
    }

    #hint {
      position: absolute;
      bottom: 90%;
      right: 5%;
      width: 160px;
      background: rgba(255,255,255,0.8);
      color: black;
      font-family: Arial Narrow, sans-serif;
      font-style: italic;
      font-size: 0.85em;
      text-align: center;
      padding: 8px;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    #subtitle-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      text-align: center;
      font-family: Arial Narrow, sans-serif;
      font-style: italic;
      font-size: 34px;
      color: black;
      cursor: pointer;
      display: none;
    }

    #restart-btn {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial Narrow, sans-serif;
      font-style: italic;
      font-size: 1em;
      color: black;
      text-decoration: none;
      display: none;
    }

    #fade {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s;
      z-index: 999;
    }
  </style>
</head>
<body style="background-color: white;">

  <img id="rock" src="pics/hearing-place.svg">
  <img id="path" src="pics/path7.svg" style="pointer-events: none;">
  <img id="sprite7" src="pics/crab.svg">
  <div id="hint">use arrow keys to reach the rock</div>
  <div id="fade"></div>
  <div id="subtitle-box"></div>
  <a href="index.html" id="restart-btn">start over</a>

  <script>
    var rock = document.getElementById('rock');
    var path = document.getElementById('path');
    var sprite7 = document.getElementById('sprite7');
    var hint = document.getElementById('hint');
    var fade = document.getElementById('fade');
    var subtitleBox = document.getElementById('subtitle-box');
    var restartBtn = document.getElementById('restart-btn');

    var x = 200;
    var y = 580;
    var speed = 5;
    var keys = {};
    var moving = false;

    // stage 1: rock appears after 5 seconds
    setTimeout(function() {
      rock.style.opacity = '1';
    }, 2000);

    // stage 2: path and sprite appear after 10 seconds
    setTimeout(function() {
      path.style.opacity = '1';
      sprite7.style.opacity = '1';
      sprite7.style.left = x + 'px';
      sprite7.style.top = y + 'px';
      moving = true;
    }, 8000);

    // hover on rock shows hint
    rock.addEventListener('mouseover', function() {
      hint.style.opacity = '1';
    });
    rock.addEventListener('mouseout', function() {
      hint.style.opacity = '0';
    });

    // arrow key movement
    document.addEventListener('keydown', function(e) {
      keys[e.key] = true;
    });
    document.addEventListener('keyup', function(e) {
      keys[e.key] = false;
    });

    // goal: reach the rock
    function checkRock() {
      var sr = sprite7.getBoundingClientRect();
      var rr = rock.getBoundingClientRect();
      if (
        sr.left < rr.right &&
        sr.right > rr.left &&
        sr.top < rr.bottom &&
        sr.bottom > rr.top
      ) {
        moving = false;
        fadeToSentences();
      }
    }

    function fadeToSentences() {
      fade.style.opacity = '1';
      setTimeout(function() {
        rock.style.display = 'none';
        path.style.display = 'none';
        sprite7.style.display = 'none';
        hint.style.display = 'none';
        fade.style.opacity = '0';
        subtitleBox.style.display = 'block';
        startSentences();
      }, 2000);
    }

    // clickable sentences
    const lines = [
      "You found it.",
      "A place between places.",
      "You are changed.",
      "...",
    ];
    let currentLine = 0;

    function startSentences() {
      subtitleBox.textContent = lines[0];
      currentLine = 1;
      subtitleBox.addEventListener('click', nextLine);
    }

    function nextLine() {
      if (currentLine < lines.length) {
        subtitleBox.textContent = lines[currentLine];
        currentLine++;
      } else {
        subtitleBox.removeEventListener('click', nextLine);
        subtitleBox.textContent = '';
        restartBtn.style.display = 'block';
      }
    }

    function move() {
      if (moving) {
        if (keys['ArrowUp'])    y -= speed;
        if (keys['ArrowDown'])  y += speed;
        if (keys['ArrowLeft'])  x -= speed;
        if (keys['ArrowRight']) x += speed;
        sprite7.style.top = y + 'px';
        sprite7.style.left = x + 'px';
        checkRock();
      }
      requestAnimationFrame(move);
    }

    move();
  </script>

</body>
</html>
