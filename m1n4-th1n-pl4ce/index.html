<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!--<a href="index.html" class="restart">restart</a>-->

<div id="subtitle-box">
  Click to start
</div>

<script>
const lines = [
  "The light disappeared for 24 hours, and when it returned, had put us in between, in the middle.",
  "In daylight it became clear that a huge crater had appeared while it was dark.",
  "The trickster told us to leave behind anything that tied us to the past.",
  "'Throw it in! Time to look ahead!'",
  "The trickster is not a real ruler, nor is the crater a real place.",
  "You are not to seek it out.",
  "Instead, look for the places that are not visible on the maps.",
  "The ones with a real way in and a real way out,",
  "places of <i>real</i> transformation,",
  "where all limits are relaxed.",
  "...",
];

let currentLine = 0;

const box = document.getElementById("subtitle-box");

box.addEventListener("click", () => {
  // show current line first
  if (currentLine < lines.length) {
    box.textContent = lines[currentLine];
    currentLine++;
    return;
  }

  // end state → turn into link behavior
  box.textContent = "Watch out for the trickster.";
  box.style.cursor = "pointer";

  // replace click behavior safely
  box.onclick = () => {
    window.location.href = "intro.html";
  };
});
</script>

  <!--<a href="intro.html" class="continue-btn">Continue</a>-->

</body>
</html>
