<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .floating {
      position: absolute;
      margin-top: 20px;
      left: 2%;
      width: 120px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body style="
  background-color: purple;
  background-image: url('pics/maze122.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
">
  <audio id="bg-sound" src="sounds/loop.mp3" loop></audio>
  <script>
    document.getElementById('bg-sound').play();
  </script>

  <div class="trickster-wrap">
    <img src="pics/trick2.svg" class="floating">
    <img src="pics/speech12.svg" class="trickster-bubble">
  </div>

  <a href="scene2.html" class="continue-btn">Continue differently</a>

  <img id="sprite" src="pics/crab.svg" style="position: absolute; width: 55px;">

  <div id="goal" style="
    position: absolute;
    width: 60px;
    height: 60px;
    bottom: 1%;
    right: 5%;
    /* background: red; */
  "></div>

  <div id="start" style="
    position: absolute;
    width: 20px;
    height: 20px;
    top: 48%;
    left: 41%;
    /*background: blue;
  "></div>

  <canvas id="collisionCanvas" style="display:none;"></canvas>

<script>
var sprite = document.getElementById('sprite');
var goal = document.getElementById('goal');

var speed = 5;
var keys = {};

var x = 560;
var y = 270;

sprite.style.left = x + 'px';
sprite.style.top = y + 'px';


// ---------- COLLISION IMAGE SETUP ----------

const collisionImage = new Image();
collisionImage.src = 'pics/maze122.png';

const collisionCanvas = document.getElementById('collisionCanvas');
const collisionCtx = collisionCanvas.getContext('2d');

collisionImage.onload = function () {

  collisionCanvas.width = collisionImage.width;
  collisionCanvas.height = collisionImage.height;

  collisionCtx.drawImage(collisionImage, 0, 0);
};


// ---------- KEY INPUT ----------

document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
});

document.addEventListener('keyup', function(e) {
  keys[e.key] = false;
});


// ---------- COLLISION CHECK ----------

function canMoveTo(newX, newY) {

  // sample roughly center of sprite
  var sampleX = newX + 27;
  var sampleY = newY + 27;

  // convert screen coords to image coords
  var imgX = Math.floor(
    sampleX / window.innerWidth * collisionCanvas.width
  );

  var imgY = Math.floor(
    sampleY / window.innerHeight * collisionCanvas.height
  );

  var pixel = collisionCtx.getImageData(imgX, imgY, 1, 1).data;

  // alpha channel
  var alpha = pixel[3];

  // transparent = walkable
  return alpha === 0;
}


// ---------- GOAL CHECK ----------

function checkGoal() {

  var sr = sprite.getBoundingClientRect();
  var gr = goal.getBoundingClientRect();

  if (
    sr.left < gr.right &&
    sr.right > gr.left &&
    sr.top < gr.bottom &&
    sr.bottom > gr.top
  ) {
    window.location.href = 'scene2.html';
  }
}


// ---------- MOVEMENT ----------

function move() {

  if (keys['ArrowUp']) {
    if (canMoveTo(x, y - speed)) {
      y -= speed;
    }
  }

  if (keys['ArrowDown']) {
    if (canMoveTo(x, y + speed)) {
      y += speed;
    }
  }

  if (keys['ArrowLeft']) {
    if (canMoveTo(x - speed, y)) {
      x -= speed;
    }
  }

  if (keys['ArrowRight']) {
    if (canMoveTo(x + speed, y)) {
      x += speed;
    }
  }

  sprite.style.top = y + 'px';
  sprite.style.left = x + 'px';

  checkGoal();

  requestAnimationFrame(move);
}

move();

</script>

</body>
</html>
