<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .floating {
      position: absolute;
      margin-top: 20px;
      left: 2%;
      width: 120px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body style="
  background-color: purple;
  background-image: url('pics/maze122.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
">

  <audio id="bg-sound" src="sounds/loop.mp3" loop></audio>
  <script>
    document.getElementById('bg-sound').play();
  </script>

  <div class="trickster-wrap">
    <img src="pics/trick2.svg" class="floating">
    <img src="pics/speech12.svg" class="trickster-bubble">
  </div>

  <a href="scene2.html" class="continue-btn">Continue differently</a>

  <img id="sprite" src="pics/crab.svg" style="
    position: absolute;
    width: 55px;
    top: 50%;
    left: 50%;
  ">

  <div id="goal" style="
    position: absolute;
    width: 60px;
    height: 60px;
    bottom: 1%;
    right: 5%;
    /* background: red; uncomment to see goal area while testing */
  "></div>

  <div id="start" style="
  position: absolute;
  width: 20px;
  height: 20px;
  top: 48%;
  left: 41%;
  /*background: blue;*/
"></div>

  <script>
 var sprite = document.getElementById('sprite');
    var goal = document.getElementById('goal');
    var startDiv = document.getElementById('start');
    var speed = 5;
    var keys = {};
    var x = 0;
    var y = 0;

    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    var mazeImg = new Image();
    mazeImg.crossOrigin = 'anonymous';
    mazeImg.src = 'pics/maze122.png';
    mazeImg.onload = function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.drawImage(mazeImg, 0, 0, canvas.width, canvas.height);

      var startRect = startDiv.getBoundingClientRect();
      x = startRect.left;
      y = startRect.top;

      sprite.style.left = x + 'px';
      sprite.style.top = y + 'px';

      move();
    };

    function isOnWall(px, py) {
      try {
        var spriteSize = 55;
        var centerX = px + spriteSize / 2;
        var centerY = py + spriteSize / 2;
        var pixel = ctx.getImageData(centerX, centerY, 1, 1).data;
        return pixel[3] > 50;
      } catch(e) {
        return false;
      }
    }

    function checkGoal() {
      var sr = sprite.getBoundingClientRect();
      var gr = goal.getBoundingClientRect();
      if (
        sr.left < gr.right &&
        sr.right > gr.left &&
        sr.top < gr.bottom &&
        sr.bottom > gr.top
      ) {
        window.location.href = 'scene2.html';
      }
    }

    function move() {
      var newX = x;
      var newY = y;

      if (keys['ArrowUp'])    newY -= speed;
      if (keys['ArrowDown'])  newY += speed;
      if (keys['ArrowLeft'])  newX -= speed;
      if (keys['ArrowRight']) newX += speed;

      if (!isOnWall(newX, y)) x = newX;
      if (!isOnWall(x, newY)) y = newY;

      sprite.style.top = y + 'px';
      sprite.style.left = x + 'px';

      checkGoal();
      requestAnimationFrame(move);
    }

    document.addEventListener('keydown', function(e) {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', function(e) {
      keys[e.key] = false;
    });
  </script>

</body>
</html>
