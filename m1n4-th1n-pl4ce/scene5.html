<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
</head>
<audio id="sound-yes" src="sounds/echo.mp3" preload="auto"></audio>
<audio id="sound-no" src="sounds/crickets.mp3" preload="auto"></audio>
<body style="background-image: none; background-color: white;">
<div class="split">
  <a href="scene13.html" class="split-left"></a>
  <a href="scene6.html" class="split-right"></a>
</div>
<div id="cursor-text" style="
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-family: Arial Narrow, sans-serif;
  font-style: italic;
  font-size: 0.9em;
  color: white;
  white-space: nowrap;
"></div>
<script>
  var left = document.querySelector('.split-left');
  var right = document.querySelector('.split-right');
  var soundYes = document.getElementById('sound-yes');
  var soundNo = document.getElementById('sound-no');

  function stopAll() {
    soundYes.pause();
    soundYes.currentTime = 0;
    soundNo.pause();
    soundNo.currentTime = 0;
  }

  left.addEventListener('mouseover', function() {
    stopAll();
    soundYes.play();
    left.style.backgroundColor = 'black';
    left.style.color = 'red';
    right.style.backgroundColor = 'red';
    right.style.color = 'black';
  });

  right.addEventListener('mouseover', function() {
    stopAll();
    soundNo.play();
    right.style.backgroundColor = 'black';
    right.style.color = 'red';
    left.style.backgroundColor = 'red';
    left.style.color = 'black';
  });

  left.addEventListener('click', function(e) {
    e.preventDefault();
    stopAll();
    if (localStorage.getItem('maze-visited')) {
      window.location.href = 'scene7.html';
    } else {
      window.location.href = 'scene13.html';
    }
  });

  left.addEventListener('mouseout', function() { stopAll(); });

  right.addEventListener('mouseout', function() {
    stopAll();
    left.style.backgroundColor = 'black';
    left.style.color = 'red';
    right.style.backgroundColor = 'red';
    right.style.color = 'black';
  });

  var text = 'do not turn a deaf ear...which way?';
  var chars = [];
  var mouseX = 0;
  var mouseY = 0;

  text.split('').forEach(function(char, i) {
    var span = document.createElement('span');
    span.textContent = char === ' ' ? '\u00A0' : char;
    span.style.cssText = 'position: fixed; pointer-events: none; z-index: 9999; font-family: Arial Narrow, sans-serif; font-style: italic; font-size: 0.9em; color: white;';
    document.body.appendChild(span);
    chars.push({ el: span, x: 0, y: 0 });
  });

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    chars[0].x += (mouseX + 20 - chars[0].x) * 0.3;
    chars[0].y += (mouseY + 20 - chars[0].y) * 0.3;
    chars[0].el.style.left = chars[0].x + 'px';
    chars[0].el.style.top = chars[0].y + 'px';
    for (var i = 1; i < chars.length; i++) {
      chars[i].x += (chars[i-1].x - chars[i].x) * 0.3;
      chars[i].y += (chars[i-1].y - chars[i].y) * 0.3;
      chars[i].el.style.left = (chars[i].x + i * 9) + 'px';
      chars[i].el.style.top = chars[i].y + 'px';
    }
    requestAnimationFrame(animate);
  }
  animate();
</script>
<script src="popup.js"></script>
</body>
</html>
