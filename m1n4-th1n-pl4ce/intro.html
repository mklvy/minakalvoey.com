<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a href="scene1.html" class="img-btn" id="center-btn">
    <img src="pics/rocks.svg">
  </a>

  <div id="ring"></div>

<audio id="bg-sound" src="sounds/drone.mp3" loop></audio>

  <script>
    const centerBtn = document.getElementById("center-btn");
    const ring = document.getElementById("ring");
    document.getElementById('bg-sound').play();

    let count = 0;
    const max = 12;

    centerBtn.addEventListener("click", (e) => {
      // stop immediate navigation so we can animate first
      e.preventDefault();

      if (count < max) {
        spawnAgain(count);
        count++;
      } else {
        window.location.href = "scene1.html";
      }
    });

  function spawnAgain(i) {
  const el = document.createElement("div");
  el.classList.add("again");
  el.textContent = (i === 0) ? "again" : (i === max - 1) ? "and again..." : "and again";
  
  const startX = window.innerWidth * 0.15;
  const spacing = window.innerWidth * 0.06;
  const x = startX + i * spacing;
  const y = 50 + (Math.random() * 120 - 60);
  
  el.style.position = "absolute";
  el.style.left = `${x}px`;
  el.style.top = `calc(50% + ${y}px)`;
  el.style.transform = "translateY(-50%)";
  el.style.color = "white";
  el.style.fontSize = "1.8vw";
  ring.appendChild(el);
}
  </script>
  <script src="popup.js"></script>
</body>
</html>
