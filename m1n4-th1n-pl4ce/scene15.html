<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hotspot {
      position: absolute;
      cursor: pointer;
      /* background: rgba(255,0,0,0.3); */
    }
    body {
      border: 12px solid black;
      box-sizing: border-box;
      min-height: 100vh;
    }
  </style>
</head>
<body style="background-image: url('pics/9-8.svg'); background-size: 100% 100%;">

  <a href="scene14.html" class="hotspot" style="top: 20%; left: 1%; width: 22%; height: 70%;"></a>
  <a href="scene9.html" class="hotspot" style="top: 20%; left: 30%; width: 40%; height: 70%;"></a>
  <a href="scene13.html" class="hotspot" style="top: 20%; left: 77%; width: 22%; height: 70%;"></a>

  <img id="poster" src="pics/object1.png" style="
    position: absolute;
    top: 75%;
    left: 45%;
    width: 80px;
    transform: perspective(200px) rotateX(40deg);
    cursor: pointer;
    z-index: 10;
  ">

  <div id="poster-overlay" style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 998;
    cursor: pointer;
  "></div>

  <img id="poster-full" src="pics/object1full.png" style="
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 80%;
    max-height: 80%;
    display: none;
    z-index: 999;
    cursor: pointer;
  ">

  <script>
    var poster = document.getElementById('poster');
    var posterFull = document.getElementById('poster-full');
    var overlay = document.getElementById('poster-overlay');

    poster.addEventListener('click', function(e) {
      e.stopPropagation();
      posterFull.style.display = 'block';
      overlay.style.display = 'block';
    });

    overlay.addEventListener('click', function() {
      posterFull.style.display = 'none';
      overlay.style.display = 'none';
    });

    posterFull.addEventListener('click', function() {
      posterFull.style.display = 'none';
      overlay.style.display = 'none';
    });
  </script>

</body>
</html>
