<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: none; background-color: white;">
<audio id="sound-yes" src="sounds/wind.mp3" preload="auto"></audio>
<audio id="sound-no" src="sounds/well.mp3" preload="auto"></audio>
<div class="split">
  <a href="scene4.html" class="split-left"></a>
  <a href="loop12.html" class="split-right"></a>
</div>
<div id="cursor-text" style="
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-family: Arial Narrow, sans-serif;
  font-style: italic;
  font-size: 0.9em;
  color: white;
  white-space: nowrap;
"></div>
<script>
  var left = document.querySelector('.split-left');
  var right = document.querySelector('.split-right');
  var soundYes = document.getElementById('sound-yes');
  var soundNo = document.getElementById('sound-no');

  function stopAll() {
    if (soundYes) { soundYes.pause(); soundYes.currentTime = 0; }
    if (soundNo) { soundNo.pause(); soundNo.currentTime = 0; }
  }

  left.addEventListener('mouseover', function() {
    stopAll();
    soundYes.play();
    left.style.backgroundColor = 'black';
    left.style.color = 'purple';
    right.style.backgroundColor = 'purple';
    right.style.color = 'black';
  });

  right.addEventListener('mouseover', function() {
    stopAll();
    soundNo.play();
    right.style.backgroundColor = 'black';
    right.style.color = 'purple';
    left.style.backgroundColor = 'purple';
    left.style.color = 'black';
  });

  right.addEventListener('click', function(e) {
    e.preventDefault();
    stopAll();
    document.body.style.backgroundColor = 'purple';
    document.querySelector('.split').style.display = 'none';
    var flashSound = new Audio('sounds/trickster.mp3');
    flashSound.play();
    var flashImg = document.createElement('img');
    flashImg.src = 'pics/trick.svg';
    flashImg.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:30%; z-index:999; animation: flash 0.4s steps(1) 3; margin:0; padding:0;';
    document.body.appendChild(flashImg);
    setTimeout(function() {
      window.location.href = 'loop12.html';
    }, 1500);
  });

  left.addEventListener('mouseout', function() { stopAll(); });
  right.addEventListener('mouseout', function() {
    stopAll();
    left.style.backgroundColor = 'black';
    left.style.color = 'purple';
    right.style.backgroundColor = 'purple';
    right.style.color = 'black';
  });

var text = 'pin back your ears...choose wisely';
  var chars = [];
  var mouseX = 0;
  var mouseY = 0;

  // create one span per character
  text.split('').forEach(function(char, i) {
    var span = document.createElement('span');
    span.textContent = char === ' ' ? '\u00A0' : char;
    span.style.cssText = 'position: fixed; pointer-events: none; z-index: 9999; font-family: Arial Narrow, sans-serif; font-style: italic; font-size: 0.9em; color: white;';
    document.body.appendChild(span);
    chars.push({ el: span, x: 0, y: 0 });
  });

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    // first char follows mouse
    chars[0].x += (mouseX + 20 - chars[0].x) * 0.3;
    chars[0].y += (mouseY + 20 - chars[0].y) * 0.3;
    chars[0].el.style.left = chars[0].x + 'px';
    chars[0].el.style.top = chars[0].y + 'px';

    // each subsequent char follows the one before it
    for (var i = 1; i < chars.length; i++) {
      chars[i].x += (chars[i-1].x - chars[i].x) * 0.3;
      chars[i].y += (chars[i-1].y - chars[i].y) * 0.3;
      chars[i].el.style.left = (chars[i].x + i * 9) + 'px';
      chars[i].el.style.top = chars[i].y + 'px';
    }

    requestAnimationFrame(animate);
  }

  animate();
</script>
<script src="popup.js"></script>
</body>
</html>
