<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .floating {
      position: absolute;
      margin-top: 20px;
      left: 2%;
      width: 120px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  .floating {
  animation: float 3s ease-in-out infinite, glow 3s ease-in-out 40;
}
  @keyframes glow {
  0%   { filter: drop-shadow(0 0 0px yellow); }
  50%  { filter: drop-shadow(0 0 15px yellow); }
  100% { filter: drop-shadow(0 0 0px yellow); }
}    
  </style>
</head>
<body style="
  background-color: yellow;
  background-image: url('pics/maze5.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
">
  <audio id="bg-sound" src="sounds/loop.mp3" loop></audio>
  <script>
    document.getElementById('bg-sound').play();
  </script>

<div class="trickster-wrap">
  <img src="pics/trick2.svg" class="floating">
  <img src="pics/speech5.svg" class="trickster-bubble">
</div>

  <img id="sprite" src="pics/whale.svg" style="position: absolute; width: 60px;">

  <div id="goal" style="
    position: absolute;
    width: 60px;
    height: 60px;
    bottom: 2%;
    left: 1%;
    /*background: red;*/
  "></div>

  <script>
    var sprite = document.getElementById('sprite');
    var goal = document.getElementById('goal');
    var speed = 5;
    var keys = {};
    var x = 740;
    var y = 290;

    sprite.style.left = x + 'px';
    sprite.style.top = y + 'px';

    document.addEventListener('keydown', function(e) {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', function(e) {
      keys[e.key] = false;
    });

    function checkGoal() {
      var sr = sprite.getBoundingClientRect();
      var gr = goal.getBoundingClientRect();
      if (
        sr.left < gr.right &&
        sr.right > gr.left &&
        sr.top < gr.bottom &&
        sr.bottom > gr.top
      ) {
        window.location.href = 'scene4.html';
      }
    }

    function move() {
      if (keys['ArrowUp'])    y -= speed;
      if (keys['ArrowDown'])  y += speed;
      if (keys['ArrowLeft'])  x -= speed;
      if (keys['ArrowRight']) x += speed;

      sprite.style.top = y + 'px';
      sprite.style.left = x + 'px';

      checkGoal();
      requestAnimationFrame(move);
    }

    move();
  </script>

</body>
</html>
