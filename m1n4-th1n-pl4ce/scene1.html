<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>again and again and again</title>
  <link rel="stylesheet" href="style.css">
</head>

<audio id="sound-yes" src="sounds/frog2.mp3" preload="auto"></audio>
<audio id="sound-no" src="sounds/river.mp3" preload="auto"></audio>

<body style="background-image: none; background-color: white;">

<div class="split">
  <a href="scene2.html" class="split-left"></a>
  <a href="scene3.html" class="split-right"></a>
</div>

<div id="cursor-text" style="
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-family: Arial Narrow, sans-serif;
  font-style: italic;
  font-size: 0.9em;
  color: white;
  white-space: nowrap;
"></div>

<script>
  var left = document.querySelector('.split-left');
  var right = document.querySelector('.split-right');
  var soundYes = document.getElementById('sound-yes');
  var soundNo = document.getElementById('sound-no');

  function stopAll() {
    soundYes.pause();
    soundYes.currentTime = 0;
    soundNo.pause();
    soundNo.currentTime = 0;
  }

  left.addEventListener('mouseover', function() {
    stopAll();
    soundYes.play();
    left.style.backgroundColor = 'black';
    left.style.color = 'gray';
    right.style.backgroundColor = 'gray';
    right.style.color = 'black';
  });

  right.addEventListener('mouseover', function() {
    stopAll();
    soundNo.play();
    right.style.backgroundColor = 'black';
    right.style.color = 'gray';
    left.style.backgroundColor = 'gray';
    left.style.color = 'black';
  });

  left.addEventListener('mouseout', function() {
    stopAll();
  });

  right.addEventListener('mouseout', function() {
    stopAll();
    left.style.backgroundColor = 'black';
    left.style.color = 'gray';
    right.style.backgroundColor = 'gray';
    right.style.color = 'black';
  });

  var text = 'lend me your ears...where do you go next?';
  var chars = [];
  var mouseX = 0;
  var mouseY = 0;

  // create one span per character
  text.split('').forEach(function(char, i) {
    var span = document.createElement('span');
    span.textContent = char === ' ' ? '\u00A0' : char;
    span.style.cssText = 'position: fixed; pointer-events: none; z-index: 9999; font-family: Arial Narrow, sans-serif; font-style: italic; font-size: 2em; color: white;';
    document.body.appendChild(span);
    chars.push({ el: span, x: 0, y: 0 });
  });

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    // first char follows mouse
    chars[0].x += (mouseX + 20 - chars[0].x) * 0.3;
    chars[0].y += (mouseY + 20 - chars[0].y) * 0.3;
    chars[0].el.style.left = chars[0].x + 'px';
    chars[0].el.style.top = chars[0].y + 'px';

    // each subsequent char follows the one before it
    for (var i = 1; i < chars.length; i++) {
      chars[i].x += (chars[i-1].x - chars[i].x) * 0.3;
      chars[i].y += (chars[i-1].y - chars[i].y) * 0.3;
      chars[i].el.style.left = (chars[i].x + i * 15) + 'px';
      chars[i].el.style.top = chars[i].y + 'px';
    }

    requestAnimationFrame(animate);
  }

  animate();
</script>
<script src="popup.js"></script>
</body>
</html>
